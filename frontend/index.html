<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCore HMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">MediCore</div>
    <ul>
      <li class="active" data-page="dashboard">🏠 Dashboard</li>
      <li data-page="patients">🧑 Patients</li>
      <li data-page="doctors">👨‍⚕️ Doctors</li>
      <li data-page="appointments">📅 Appointments</li>
      <li data-page="billing">💳 Billing</li>
    </ul>
  </nav>

  <main class="content">
    <div id="page-dashboard"    class="page active"></div>
    <div id="page-patients"     class="page"></div>
    <div id="page-doctors"      class="page"></div>
    <div id="page-appointments" class="page"></div>
    <div id="page-records"      class="page"></div>
    <div id="page-billing"      class="page"></div>
  </main>

  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <button id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/patients.js"></script>
  <script src="js/doctors.js"></script>
  <script src="js/appointments.js"></script>
  <script src="js/billing.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
